<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Fire Hydrant Rescue</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<canvas id="gameCanvas"></canvas>

<div id="startScreen">
<h1>🔥 Fire Hydrant Rescue 🔥</h1>
<p>Stop the spreading fires!</p>
<p>Move with arrows</p>
<p>Shoot water with SPACE or 💧</p>
<p>Tap anywhere to begin</p>
</div>

<!-- MOBILE CONTROLS -->

<button id="up" class="control up">↑</button>
<button id="left" class="control left">←</button>
<button id="right" class="control right">→</button>
<button id="down" class="control down">↓</button>
<button id="shoot" class="control shoot">💧</button>

<script src="script.js"></script>

</body>
</html>
